<!-- templates/navbar.html -->
<nav class="navbar navbar-expand-lg sipan-navbar">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand" href="{% url 'envios:home' %}">
            <i class="bi bi-truck me-1"></i> Sipán<span>Trans</span>
        </a>

        <!-- Toggler para móviles -->
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain"
                aria-controls="navMain" aria-expanded="false"
                aria-label="Alternar menú">
            <i class="bi bi-list text-white fs-4"></i>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                       href="{% url 'envios:home' %}">
                        <i class="bi bi-house me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'encomienda-list' %}active{% endif %}"
                       href="{% url 'envios:encomienda-list' %}">
                        <i class="bi bi-box-seam me-1"></i> Encomiendas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'encomienda-create' %}active{% endif %}"
                       href="{% url 'envios:encomienda-create' %}">
                        <i class="bi bi-plus-circle me-1"></i> Nueva
                    </a>
                </li>
            </ul>

            <!-- Usuario logueado -->
            {% if user.is_authenticated %}
            <ul class="navbar-nav gap-1 align-items-lg-center">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="avatar-circle">{{ user.username|slice:":1"|upper }}</span>
                        {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'envios:perfil' %}">
                                <i class="bi bi-person me-2"></i>Mi Perfil
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'admin:index' %}" target="_blank">
                                <i class="bi bi-shield-lock me-2"></i>Admin
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
            {% endif %}
        </div>
    </div>
</nav>
