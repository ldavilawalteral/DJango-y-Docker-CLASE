{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sipán Trans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body { background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 60%, #0ea5e9 100%); }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 25px 50px rgba(0,0,0,.25);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #1a56db;
            text-align: center;
            margin-bottom: .25rem;
        }
        .login-logo i { margin-right: .35rem; }
        .login-logo span { color: #0ea5e9; }
        .login-subtitle {
            text-align: center;
            color: #6b7280;
            font-size: .9rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-truck"></i>Sipán<span>Trans</span>
        </div>
        <p class="login-subtitle">Sistema de Gestión de Encomiendas</p>

        {% if form.errors %}
        <div class="alert alert-danger py-2 mb-3">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="mb-3">
                <label for="id_username" class="form-label fw-600">
                    <i class="bi bi-person me-1"></i>Usuario
                </label>
                <input type="text" name="username" id="id_username"
                       class="form-control" placeholder="Tu usuario" autofocus required>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label fw-600">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" name="password" id="id_password"
                       class="form-control" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
            </button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:.8rem;">
            Sipán Trans &copy; {% now "Y" %}
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
